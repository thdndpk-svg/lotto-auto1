name: Lotto Kakao Weekly

on:
  workflow_dispatch:
    inputs:
      candidates:
        description: "후보 조합 수"
        required: false
        default: "20000"
  schedule:
    # Korea time Wednesday 12:00 = UTC Wednesday 03:00
    - cron: "0 3 * * 3"

permissions:
  contents: write

jobs:
  send-kakao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run weekly Lotto analysis and Kakao send
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          LOTTO_CANDIDATES: ${{ github.event.inputs.candidates || '20000' }}
        run: python weekly_kakao_report.py --candidates "$LOTTO_CANDIDATES"

      - name: Build knowledge net
        if: success()
        run: python lotto_knowledge_net.py

      - name: Commit latest recommendations and knowledge net
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/lotto.csv reports/latest_recommendations.json knowledge
          git commit -m "Update latest lotto recommendations and knowledge net" || echo "No recommendation changes"
          git push

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lotto-report
          path: reports/*.txt
