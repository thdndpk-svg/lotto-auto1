name: Lotto Kakao Sunday Result

on:
  workflow_dispatch:
  schedule:
    # Korea time Sunday 11:00 = UTC Sunday 02:00
    - cron: "0 2 * * 0"

permissions:
  contents: write

jobs:
  send-result:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Sunday Lotto result to Kakao
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        run: python sunday_kakao_result.py

      - name: Commit feedback memory
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/lotto.csv knowledge
          git commit -m "Update lotto feedback memory" || echo "No feedback changes"
          git push

      - name: Upload recommendation artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lotto-sunday-result
          path: |
            reports/latest_recommendations.json
            knowledge/feedback_memory.json
