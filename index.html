<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#111315">
  <title>Lotto Auto Mobile</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101113;
      --panel: #171a1f;
      --panel-2: #1d2229;
      --line: #2a3038;
      --text: #f4f6f8;
      --muted: #a9b1bb;
      --soft: #d5dae0;
      --accent: #3ddc97;
      --accent-2: #ffd166;
      --warn: #ff6b6b;
      --blue: #4dabf7;
      --shadow: 0 18px 50px rgba(0, 0, 0, .32);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(61, 220, 151, .12), transparent 280px),
        radial-gradient(circle at 85% 8%, rgba(255, 209, 102, .14), transparent 240px),
        var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }

    button, input { font: inherit; }
    button {
      border: 0;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 1120px);
      margin: 0 auto;
      padding: max(14px, env(safe-area-inset-top)) 14px max(28px, env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #1ea7ff);
      color: #07110e;
      font-weight: 900;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1;
    }

    .brand small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 14px;
    }

    .panel {
      background: rgba(23, 26, 31, .92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
    }

    .panel-head span {
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body { padding: 14px; }
    .latest-main {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
    }

    .draw-badge {
      display: grid;
      place-items: center;
      width: 78px;
      height: 78px;
      border-radius: 8px;
      background: #f6f7fb;
      color: #14171b;
      font-weight: 900;
    }

    .draw-badge strong { font-size: 24px; }
    .draw-badge span { font-size: 12px; }

    .balls {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .ball {
      display: inline-grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: #111315;
      font-weight: 900;
      font-size: 14px;
      box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .14), 0 8px 20px rgba(0, 0, 0, .24);
    }

    .ball.s1 { background: #f6c85f; }
    .ball.s2 { background: #5fb4f6; }
    .ball.s3 { background: #f56a6a; color: white; }
    .ball.s4 { background: #9ea7b3; color: white; }
    .ball.s5 { background: #55d28b; }
    .plus { color: var(--muted); font-weight: 800; }

    .prizes {
      width: 100%;
      margin-top: 14px;
      border-collapse: collapse;
      color: var(--soft);
      font-size: 13px;
    }

    .prizes td {
      padding: 9px 0;
      border-top: 1px solid var(--line);
    }

    .prizes td:last-child { text-align: right; color: var(--text); font-weight: 800; }
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    input {
      width: 100%;
      min-height: 42px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1216;
      color: var(--text);
      outline: none;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .btn {
      min-height: 44px;
      border-radius: 8px;
      font-weight: 900;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), #21b4ff);
      color: #07110e;
    }

    .btn:disabled { opacity: .55; cursor: wait; }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px 14px 0;
    }

    .tab {
      flex: 1;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
    }

    .tab.active {
      background: #f4f6f8;
      color: #121417;
      border-color: #f4f6f8;
      font-weight: 900;
    }

    .combo-list {
      display: grid;
      gap: 12px;
    }

    .combo-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #13171c;
      padding: 12px;
    }

    .combo-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }

    .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 28px;
      border-radius: 8px;
      background: rgba(61, 220, 151, .18);
      color: var(--accent);
      font-weight: 900;
    }

    .score { color: var(--accent-2); font-weight: 900; }

    .pattern {
      position: relative;
      margin-top: 12px;
      aspect-ratio: 7 / 7;
      max-height: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f1216;
      overflow: hidden;
    }

    .pattern-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(7, 1fr);
    }

    .pattern-cell {
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(255, 255, 255, .05);
      border-bottom: 1px solid rgba(255, 255, 255, .05);
      color: rgba(255, 255, 255, .3);
      font-size: 10px;
    }

    .pattern-cell.hit {
      color: #101113;
      background: var(--accent-2);
      font-weight: 900;
    }

    .pattern svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .parts {
      display: grid;
      gap: 7px;
      margin-top: 10px;
    }

    .part {
      display: grid;
      grid-template-columns: 72px 1fr 48px;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 7px;
      border-radius: 999px;
      background: #262c34;
      overflow: hidden;
    }

    .bar i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .metric {
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #12161b;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .metric strong {
      display: block;
      margin-top: 7px;
      font-size: 18px;
    }

    .number-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .number-table td {
      padding: 8px 0;
      border-top: 1px solid var(--line);
    }

    .number-table td:last-child {
      text-align: right;
      color: var(--accent-2);
      font-weight: 900;
    }

    .notice {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .hidden { display: none; }

    @media (max-width: 840px) {
      .app { padding-left: 10px; padding-right: 10px; }
      .grid { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; }
      .status { font-size: 11px; }
      .controls, .actions, .metric-grid { grid-template-columns: 1fr; }
      .latest-main { grid-template-columns: 1fr; }
      .draw-badge { width: 100%; height: 62px; }
      .ball { width: 35px; height: 35px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">L</div>
        <div>
          <h1>Lotto Auto</h1>
          <small>mobile analysis</small>
        </div>
      </div>
      <div class="status">
        <span><i class="dot"></i><b id="statusText">로딩</b></span>
        <span id="updatedAt">-</span>
      </div>
    </header>

    <section class="grid">
      <div class="panel">
        <div class="panel-head">
          <h2>최신 회차</h2>
          <span id="latestMeta">-</span>
        </div>
        <div class="panel-body">
          <div class="latest-main">
            <div class="draw-badge"><span>회차</span><strong id="drawNo">-</strong></div>
            <div class="balls" id="latestBalls"></div>
          </div>
          <table class="prizes"><tbody id="prizeBody"></tbody></table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>분석 설정</h2>
          <span id="analysisState">준비</span>
        </div>
        <div class="panel-body">
          <div class="controls">
            <label>기준일<input id="targetDate" type="date"></label>
            <label>후보 조합 수<input id="candidates" type="number" min="1000" max="60000" step="1000" value="12000"></label>
            <label>시드<input id="seed" type="number" value="18"></label>
            <label>번호 풀<input id="poolSize" type="number" min="18" max="36" step="1" value="30"></label>
          </div>
          <div class="actions">
            <button class="btn primary" id="analyzeBtn">분석 실행</button>
            <button class="btn" id="reloadBtn">데이터 갱신</button>
          </div>
          <div class="notice" id="notice">로또 추첨은 독립 시행입니다. 결과는 데이터 기반 참고값입니다.</div>
        </div>
      </div>
    </section>

    <section class="grid" style="margin-top:14px">
      <div class="panel">
        <div class="panel-head">
          <h2>추천 조합</h2>
          <span id="comboMeta">-</span>
        </div>
        <div class="tabs">
          <button class="tab active" data-tab="saved">저장 추천</button>
          <button class="tab" data-tab="mobile">모바일 분석</button>
        </div>
        <div class="panel-body">
          <div id="savedPanel" class="combo-list"></div>
          <div id="mobilePanel" class="combo-list hidden"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>핵심 신호</h2>
          <span id="signalMeta">-</span>
        </div>
        <div class="panel-body">
          <div class="metric-grid">
            <div class="metric"><span>최근 강세</span><strong id="hotMetric">-</strong></div>
            <div class="metric"><span>같은 날짜</span><strong id="sameMetric">-</strong></div>
            <div class="metric"><span>앞번호</span><strong id="frontMetric">-</strong></div>
            <div class="metric"><span>피드백</span><strong id="feedbackMetric">-</strong></div>
          </div>
          <table class="number-table" style="margin-top:12px"><tbody id="numberBody"></tbody></table>
        </div>
      </div>
    </section>
  </main>
  <script src="assets/mobile.js?v=20260707"></script>
</body>
</html>
